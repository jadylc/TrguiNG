name: Nightly Tag

on:
  push:
    branches:
      - master

concurrency:
  group: ${{ github.workflow }}-${{ github.sha }}
  cancel-in-progress: false

jobs:
  tag-nightly:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Determine nightly tag
        id: vars
        run: |
          SHORT_SHA="$(git rev-parse --short=12 "$GITHUB_SHA")"
          echo "tag_name=nightly-${SHORT_SHA}" >> "$GITHUB_OUTPUT"

      - name: Check for existing tag
        id: exists
        env:
          GH_TOKEN: ${{ secrets.WORKFLOW_TOKEN }}
        run: |
          if git ls-remote --tags origin "${{ steps.vars.outputs.tag_name }}" | grep -q "${{ steps.vars.outputs.tag_name }}"; then
            echo "exists=true" >> "$GITHUB_OUTPUT"
          else
            echo "exists=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Create and push nightly tag
        if: steps.exists.outputs.exists != 'true'
        env:
          WORKFLOW_TOKEN: ${{ secrets.WORKFLOW_TOKEN }}
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git tag "${{ steps.vars.outputs.tag_name }}" "$GITHUB_SHA" -m "Nightly build for $GITHUB_SHA"
          git remote set-url origin "https://x-access-token:${WORKFLOW_TOKEN}@github.com/${{ github.repository }}.git"
          git push origin "${{ steps.vars.outputs.tag_name }}"
